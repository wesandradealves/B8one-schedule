name: ${COMPOSE_PROJECT_NAME}

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npm run migration:run:prod && npm run seed:prod && npm run start:prod"
    ports:
      - '${BACKEND_HTTP_PORT}:3000'
    environment:
      NODE_ENV: ${BACKEND_NODE_ENV}
      HTTP_PORT: ${BACKEND_HTTP_PORT}
      DATABASE_HOST: ${BACKEND_DATABASE_HOST}
      DATABASE_PORT: ${BACKEND_DATABASE_PORT}
      DATABASE_USERNAME: ${BACKEND_DATABASE_USERNAME}
      DATABASE_PASSWORD: ${BACKEND_DATABASE_PASSWORD}
      DATABASE_NAME: ${BACKEND_DATABASE_NAME}
      DATABASE_SSL: ${BACKEND_DATABASE_SSL}
      REDIS_HOST: ${BACKEND_REDIS_HOST}
      REDIS_PORT: ${BACKEND_REDIS_PORT}
      REDIS_PASSWORD: ${BACKEND_REDIS_PASSWORD}
      REDIS_TTL_SECONDS: ${BACKEND_REDIS_TTL_SECONDS}
      API_PREFIX: ${BACKEND_API_PREFIX}
      JWT_ACCESS_TOKEN_SECRET: ${BACKEND_JWT_ACCESS_TOKEN_SECRET}
      JWT_ACCESS_TOKEN_EXPIRES_SECONDS: ${BACKEND_JWT_ACCESS_TOKEN_EXPIRES_SECONDS}
      TWO_FA_CODE_EXPIRATION_MINUTES: ${BACKEND_TWO_FA_CODE_EXPIRATION_MINUTES}
      SMTP_HOST: ${BACKEND_SMTP_HOST}
      SMTP_PORT: ${BACKEND_SMTP_PORT}
      SMTP_USER: ${BACKEND_SMTP_USER}
      SMTP_PASS: ${BACKEND_SMTP_PASS}
      SMTP_FROM: ${BACKEND_SMTP_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_APP_NAME: ${FRONTEND_NEXT_PUBLIC_APP_NAME}
        NEXT_PUBLIC_APP_BASE_URL: ${FRONTEND_NEXT_PUBLIC_APP_BASE_URL}
        NEXT_PUBLIC_API_BASE_URL: ${FRONTEND_NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_API_TIMEOUT_MS: ${FRONTEND_NEXT_PUBLIC_API_TIMEOUT_MS}
        NEXT_PUBLIC_AUTH_COOKIE_NAME: ${FRONTEND_NEXT_PUBLIC_AUTH_COOKIE_NAME}
    ports:
      - '${FRONTEND_HTTP_PORT}:3001'
    environment:
      NODE_ENV: ${FRONTEND_NODE_ENV}
      NEXT_PUBLIC_APP_NAME: ${FRONTEND_NEXT_PUBLIC_APP_NAME}
      NEXT_PUBLIC_API_BASE_URL: ${FRONTEND_NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_APP_BASE_URL: ${FRONTEND_NEXT_PUBLIC_APP_BASE_URL}
      NEXT_PUBLIC_API_TIMEOUT_MS: ${FRONTEND_NEXT_PUBLIC_API_TIMEOUT_MS}
      NEXT_PUBLIC_AUTH_COOKIE_NAME: ${FRONTEND_NEXT_PUBLIC_AUTH_COOKIE_NAME}
    depends_on:
      backend:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '${POSTGRES_HTTP_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_HTTP_PORT}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  adminer:
    image: adminer:5.2.1
    environment:
      ADMINER_DEFAULT_SERVER: ${ADMINER_DEFAULT_SERVER}
    ports:
      - '${ADMINER_HTTP_PORT}:8080'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
